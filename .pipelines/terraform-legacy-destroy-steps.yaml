# Fork of cnp-azuredevops-libraries/steps/terraform.yaml for one-off legacy teardown.
# Differences:
# - Tfvars live in this repo under environments/ (copied from purview-azure-infrastructure).
# - Materializes pre-module Terraform from git (git archive) into legacy/<component>/.
#   At the reference commit the root module lives under components/<component>/ (not the archive root).
# - Terraform destroy runs without requiring isMain (manual/branch runs).
# Keep in sync with upstream when behaviour changes.

parameters:
  - name: initCommandOptions
    default: ''
  - name: planCommandOptions
    default: '-destroy'
  - name: destroyCommandOptions
    default: ''
  - name: environment
    default: prod
  - name: location
    default: 'UK South'
  - name: overrideAction
    default: plan
    values:
      - plan
      - destroy
  - name: product
    default: hub
  - name: component
    default: infrastructure
  - name: serviceConnection
    default: ''
  - name: terraformInitSubscription
    default: ''
  - name: tfVarsFile
    default: ''
  - name: legacyCommit
    default: '712d2e2a07957845655d7858b85692f775f41b20'
  - name: kvConnectedServiceName
    default: 'azurerm-sandbox'

steps:
  - checkout: self
    clean: true
    fetchDepth: 0
    persistCredentials: true
  - checkout: cnp-azuredevops-libraries
    clean: true

  - task: Bash@3
    displayName: Materialize legacy Terraform root (git archive)
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        REPO="$(echo "$(Build.Repository.Name)" | cut -d'/' -f2)"
        cd "$(System.DefaultWorkingDirectory)/$REPO"
        LEGACY="${{ parameters.legacyCommit }}"
        # ADO often shallow-checks out self even with fetchDepth: 0; legacy SHA is not at the branch tip.
        if ! git cat-file -e "${LEGACY}^{commit}" 2>/dev/null; then
          git fetch --unshallow 2>/dev/null || true
          git fetch --no-tags --prune origin "${LEGACY}"
        fi
        git cat-file -e "${LEGACY}^{commit}"
        mkdir -p "legacy/${{ parameters.component }}"
        git archive "${LEGACY}" | tar -xC "legacy/${{ parameters.component }}"

  - bash: echo ${{ parameters.environment }}
    displayName: Display environment parameter

  - template: steps/set-build-repo-suffix-env-var.yaml@cnp-azuredevops-libraries
  - template: steps/keyvault-read.yaml@cnp-azuredevops-libraries
    parameters:
      serviceConnection: ${{ parameters.serviceConnection }}
      environment: ${{ parameters.environment }}

  - task: Bash@3
    displayName: Install tfcmt
    condition: ne(variables['System.PullRequest.PullRequestNumber'], '')
    inputs:
      filePath: $(System.DefaultWorkingDirectory)/cnp-azuredevops-libraries/scripts/install-tfcmt.sh
      workingDirectory: $(System.DefaultWorkingDirectory)/$(buildRepoSuffix)

  - task: AzureKeyVault@2
    displayName: 'Get GitHub API token from Keyvault'
    condition: ne(variables['System.PullRequest.PullRequestNumber'], '')
    inputs:
      runAsPreJob: false
      ConnectedServiceName: ${{ parameters.kvConnectedServiceName }}
      keyVaultName: 'infra-vault-nonprod'
      secretsFilter: 'github-api-token'

  - template: steps/install-use-tfswitch.yaml@cnp-azuredevops-libraries
    parameters:
      tfswitchArgs: -b ~/.local/bin/terraform
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/legacy/${{ parameters.component }}/components/${{ parameters.component }}'

  - task: Bash@3
    displayName: Build resource values
    env:
      STAGE: ''
      MULTI_REGION: false
      ENVIRONMENT: ${{ parameters.environment }}
      COMPONENT: ${{ parameters.component }}
      LOCATION: ${{ parameters.location }}
    inputs:
      filePath: $(System.DefaultWorkingDirectory)/cnp-azuredevops-libraries/scripts/build-resource-values.sh
      workingDirectory: $(System.DefaultWorkingDirectory)/$(buildRepoSuffix)

  - task: TerraformCLI@2
    displayName: Terraform init (legacy state)
    inputs:
      command: init
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/legacy/${{ parameters.component }}/components/${{ parameters.component }}'
      backendType: azurerm
      ensureBackend: false
      backendServiceArm: ${{ parameters.serviceConnection }}
      backendAzureRmResourceGroupName: 'azure-control-${{ parameters.environment }}-rg'
      backendAzureRmResourceGroupLocation: ${{ parameters.location }}
      backendAzureRmStorageAccountName: $(controlStorageAccount)
      backendAzureRmStorageAccountSku: Standard_LRS
      backendAzureRmContainerName: subscription-tfstate
      backendAzureRmKey: '${{ parameters.location }}/${{ parameters.product }}/$(buildRepoSuffix)/${{ parameters.environment }}/${{ parameters.component }}/terraform.tfstate'
      commandOptions: '-backend-config=subscription_id=${{ parameters.terraformInitSubscription }} ${{ parameters.initCommandOptions }}'

  - task: TerraformCLI@2
    displayName: Terraform validate
    inputs:
      command: validate
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/legacy/${{ parameters.component }}/components/${{ parameters.component }}'

  - task: TerraformCLI@2
    displayName: Terraform plan (destroy preview)
    condition: and(succeeded(), eq('${{ parameters.overrideAction }}', 'plan'))
    inputs:
      command: plan
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/legacy/${{ parameters.component }}/components/${{ parameters.component }}'
      environmentServiceName: ${{ parameters.serviceConnection }}
      runAzLogin: true
      publishPlanResults: "$(tfPlanName)"
      commandOptions: >
        -out tfplan-$(tfPlanName)
        -var env=${{ parameters.environment }}
        -var builtFrom=$(Build.Repository.Name)
        -var product=${{ parameters.product }} ${{ parameters.planCommandOptions }}
        -var-file "${{ parameters.tfVarsFile }}"
        -lock=false
    retryCountOnTaskFailure: 3

  - task: TerraformCLI@2
    displayName: Terraform destroy (legacy stack)
    condition: and(succeeded(), eq('${{ parameters.overrideAction }}', 'destroy'))
    inputs:
      command: destroy
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/legacy/${{ parameters.component }}/components/${{ parameters.component }}'
      environmentServiceName: ${{ parameters.serviceConnection }}
      runAzLogin: true
      commandOptions: >
        -var env=${{ parameters.environment }}
        -var builtFrom=$(Build.Repository.Name)
        -var product=${{ parameters.product }} ${{ parameters.destroyCommandOptions }}
        -var-file "${{ parameters.tfVarsFile }}"
        -auto-approve
    retryCountOnTaskFailure: 3

  - task: AzureCLI@2
    displayName: 'Unlock TF state if required'
    condition: |
      and( succeeded(),
        or(
            and(
                ne('${{ parameters.overrideAction }}', 'plan'),
                eq(variables['isAutoTriggered'], false)
            ),
            and(
                eq(variables['isAutoTriggered'], true),
                eq(variables['isMain'], true)
            )
        )
      )
    inputs:
      scriptType: bash
      scriptLocation: scriptPath
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptPath: $(System.DefaultWorkingDirectory)/cnp-azuredevops-libraries/scripts/unlock-tf-state.sh
      arguments: $(controlStorageAccount) "${{ parameters.location }}/${{ parameters.product }}/$(buildRepoSuffix)/${{ parameters.environment }}/${{ parameters.component }}/terraform.tfstate" ${{ parameters.terraformInitSubscription }}
