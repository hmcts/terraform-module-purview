name: terraform-module-purview
trigger:
  batch: true
  branches:
    include:
      - master

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: 'hmcts'

parameters:
  - name: environment_components
    displayName: Component to Run
    type: object
    default:
      - deployment: "terraform-module-purview"
        environment: "prod"
        service_connection: "dcd-cftapps-prod"
        resourceGroupName: azure-control-prod-rg
        dependsOn: "Precheck"
  - name: overrideAction
    type: string
    default: plan
    values:
      - plan
      - apply
      - destroy

variables:
  - name: timeoutInMinutes
    value: "60"
  - name: agentPool
    value: "ubuntu-latest"
  - name: build
    value: $(Build.BuildNumber)
  - name: product
    value: "hub"
  - name: location
    value: "uksouth"
  - name: terraformInitSubscription
    value: 04d27a32-7a07-48b3-95b8-3c8691e1a263
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries

stages:
  - stage: Precheck
    jobs:
      - job: Precheck
        pool:
          vmImage: ${{ variables.agentPool }}
        timeoutInMinutes: ${{ variables.timeoutInMinutes }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: 'infra-vault-nonprod'
              keyvaultSecret: 'azure-devops-sp-token'
              serviceConnection: 'DCD-CFT-Sandbox'
              overrideAction: ${{ parameters.overrideAction }}

  - ${{ each deployment in parameters.environment_components }}:
      - stage: Infrastructure_${{ replace(variables.location, ' ', '_') }}_${{ deployment.environment }}
        displayName: Infrastructure_${{ replace(variables.location, ' ', '_') }}_${{ deployment.environment }}
        dependsOn: ${{ deployment.dependsOn }}
        condition: succeeded()
        jobs:
          - job: TerraformPlanApply
            pool:
              vmImage: ${{ variables.agentPool }}
            timeoutInMinutes: ${{ variables.timeoutInMinutes }}
            steps:
              - template: steps/terraform.yaml@cnp-azuredevops-libraries
                parameters:
                  serviceConnection: ${{ deployment.service_connection }}
                  product: ${{ variables.product }}
                  overrideAction: ${{ parameters.overrideAction }}
                  environment: ${{ deployment.environment }}
                  component: "infrastructure"
                  terraformInitSubscription: ${{ variables.terraformInitSubscription }}
                  location: "UK South"
                  tfVarsFile: "$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/prod/dcd-cftapps-prod.tfvars"
                  initCommandOptions: '-reconfigure -backend-config resource_group_name=${{ deployment.resourceGroupName }}'
                  planCommandOptions: '-compact-warnings -lock-timeout=30s'
